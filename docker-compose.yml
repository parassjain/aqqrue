services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp:/tmp
    env_file:
      - .env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  sandbox:
    build:
      context: .
      dockerfile: Dockerfile.sandbox
    profiles:
      - build-only  # Not run as a service — used as image for dynamic containers
